services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wakeup
      POSTGRES_PASSWORD: wakeup
      POSTGRES_DB: wakeup_tracker
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  auth-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
      - kafka

  wake-session-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: wake-session-service
    ports:
      - "8082:8082"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - postgres
      - redis
      - kafka

  device-validation-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: device-validation-service
    ports:
      - "8083:8083"
    depends_on:
      - kafka

  notification-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: notification-service
    ports:
      - "8084:8084"
    depends_on:
      - kafka

  analytics-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: analytics-service
    ports:
      - "8085:8085"
    depends_on:
      - postgres
      - kafka

  projection-service:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: projection-service
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - kafka

  web-app:
    build:
      context: ..
      dockerfile: frontend/web-app/Dockerfile
    environment:
      NEXT_PUBLIC_AUTH_API: http://localhost:8081
      NEXT_PUBLIC_WAKE_API: http://localhost:8082
      NEXT_PUBLIC_DEVICE_API: http://localhost:8083
      NEXT_PUBLIC_PROJECTION_API: http://localhost:8086
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - wake-session-service
      - device-validation-service

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - auth-service
      - wake-session-service
      - device-validation-service
      - notification-service
      - analytics-service
      - projection-service

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./otel/config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - prometheus
