global:
  scrape_interval: 10s

scrape_configs:
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8081"]
  - job_name: wake-session-service
    static_configs:
      - targets: ["wake-session-service:8082"]
  - job_name: device-validation-service
    static_configs:
      - targets: ["device-validation-service:8083"]
  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8084"]
  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:8085"]
  - job_name: projection-service
    static_configs:
      - targets: ["projection-service:8086"]

